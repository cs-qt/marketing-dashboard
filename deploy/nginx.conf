# ══════════════════════════════════════════════════════
#  ExpertMRI Marketing Dashboard — Nginx Configuration
#  Place at: /etc/nginx/sites-available/expertmri
#  Symlink:  ln -s /etc/nginx/sites-available/expertmri /etc/nginx/sites-enabled/
# ══════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name dashboard.expertmri.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dashboard.expertmri.com;

    # ── SSL (Let's Encrypt via certbot) ──
    ssl_certificate     /etc/letsencrypt/live/dashboard.expertmri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.expertmri.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── Client upload size (for print-ready files) ──
    client_max_body_size 500M;

    # ── API routes → Node.js ──
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Auth routes (stricter rate limit) ──
    location /api/auth/magic-link {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Upload routes (stricter rate limit + longer timeout) ──
    location ~ ^/api/(production/projects/.*/print-ready-file|media/.*/upload|media/.*/version) {
        limit_req zone=upload burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Static assets (React build — long cache) ──
    location /assets/ {
        root /var/www/expertmri/client/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── React SPA fallback ──
    location / {
        root /var/www/expertmri/client/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    # ── Logging ──
    access_log /var/log/nginx/expertmri.access.log;
    error_log  /var/log/nginx/expertmri.error.log;
}
