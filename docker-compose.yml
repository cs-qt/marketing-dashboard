# ══════════════════════════════════════════════════════
#  ExpertMRI Marketing Dashboard — Docker Compose
#  Usage: docker compose up -d
# ══════════════════════════════════════════════════════

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expertmri-app
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - expertmri

  # Optional: Nginx reverse proxy (if not using host nginx)
  nginx:
    image: nginx:alpine
    container_name: expertmri-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - expertmri

  # Optional: Certbot for Let's Encrypt SSL
  certbot:
    image: certbot/certbot
    container_name: expertmri-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - expertmri

networks:
  expertmri:
    driver: bridge
