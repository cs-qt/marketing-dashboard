# ══════════════════════════════════════════════
#  ExpertMRI Marketing Dashboard — Docker Compose
#  Usage: docker compose up -d
# ══════════════════════════════════════════════

version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: expertmri-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=expertmri
    networks:
      - expertmri

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expertmri-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/expertmri
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      mongodb:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - expertmri

volumes:
  mongodb_data:

networks:
  expertmri:
    driver: bridge
